<div >
    <h1>Mascotas Exoticas</h1>
</div>
<table class="table-primary text-center center">
    <thead>
        <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th></th>
            <th>Seleccionar</th>
        </tr>
    </thead>
    <tbody>
        @for (mascota of mascotas; track mascota.type) { <!--"track" funciona como id-->

            <tr [ngClass]="{'clearance': mascota.clearance}"><!--[ngClass]"{'nombreclase': condición}" manipula clases CSS, directiva de atributo -->
                <td><img [src]="mascota.image" width="110" class="img-thumbnail" [alt]="mascota.type"/></td>
                <td>{{mascota.type}}</td>
                <td>{{mascota.price | currency}}</td>

                @if (mascota.stock > 0) {
                    <td>{{mascota.stock}}</td>
                    <td>
                        <app-input-integer [(quantity)] = "mascota.quantity" [max] = "mascota.stock" (mError)="mError($event)"></app-input-integer>
                            <!--hacemos HERENCIA-->
                    </td>
                    <td>
                        <button class="btn btn-primary" (click)="addToCart(mascota)">Agregar</button>
                        <!--<div>
                            <button (click)="addToCart(mascota)" class="btn btn-add">Add to cart</button>
                        </div>-->
                    </td>
                    
                } @else {
                    <td><span class="badge text-bg-warning">Sin Stock</span></td>
                    <td colspan="2"></td>
                }

            </tr>
        } @empty { 
            <tr>
                <td colspan="6">No hay animales por mostrar</td>
            </tr>
        }

    </tbody>
</table>
